<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuuqLink - Search Results</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/app.js"></script>
    <style>
        .search-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 32px;
        }
        @media (max-width: 768px) {
            .search-layout { grid-template-columns: 1fr; }
        }
        .filter-section {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .filter-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }
        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .filter-item {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .filter-item:hover, .filter-item.active {
            color: var(--color-brand);
        }
    </style>
</head>
<body>

    <header></header>

    <main class="container" style="margin-top: 32px; min-height: 75vh; padding-bottom: 48px;">
        <div class="search-layout">
            <!-- Left Side: Filter Sidebar -->
            <aside style="background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 24px; box-shadow: var(--card-shadow); height: fit-content;">
                <h3 class="text-base font-bold" style="margin-bottom: 20px;">Filters</h3>
                
                <!-- Category Filter -->
                <div class="filter-section">
                    <h4 class="filter-title">Categories</h4>
                    <ul class="filter-list" id="filter-categories-list">
                        <!-- Injected -->
                    </ul>
                </div>

                <!-- Brand Filter -->
                <div class="filter-section">
                    <h4 class="filter-title">Brands</h4>
                    <ul class="filter-list" id="filter-brands-list">
                        <!-- Injected -->
                    </ul>
                </div>

                <!-- Price Filter -->
                <div class="filter-section" style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
                    <h4 class="filter-title">Price Range</h4>
                    <div class="flex-col gap-3">
                        <div class="flex gap-2">
                            <input type="number" id="price-min" class="form-input" style="padding: 6px; font-size: 12px;" placeholder="Min" min="0">
                            <input type="number" id="price-max" class="form-input" style="padding: 6px; font-size: 12px;" placeholder="Max" min="0">
                        </div>
                        <button id="apply-price-btn" class="btn btn-secondary w-full" style="padding: 8px; font-size: 12px;">Apply Price</button>
                    </div>
                </div>
            </aside>

            <!-- Right Side: Results Grid -->
            <section style="flex: 1;">
                <div class="flex justify-between align-center" style="margin-bottom: 24px;">
                    <div>
                        <h2 class="text-xl font-bold" id="results-heading">Search Results</h2>
                        <p class="text-xs" id="results-count" style="color: var(--text-secondary); margin-top: 2px;">0 items found</p>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-6" id="products-results-grid">
                    <!-- Injected -->
                </div>
            </section>
        </div>
    </main>

    <footer></footer>

    <!-- Script Drivers -->
    <script type="module">
        import { dbService } from '../js/services/dbService.js';
        import { createProductCardHTML, bindProductCardListeners } from '../js/components/ProductCard.js';
        import { getLocalizedText } from '../js/utils/helpers.js';

        let productsList = [];
        let filteredProducts = [];
        let activeCategory = '';
        let activeBrand = '';

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('query') || '';
            const category = params.get('category') || '';
            const seller = params.get('seller') || '';

            activeCategory = category;

            // Load filters
            await loadFilters();

            // Load matching products
            productsList = await dbService.getProducts({
                search: query,
                categorySlug: activeCategory,
                sellerId: seller
            });

            filteredProducts = [...productsList];
            
            updateResultsDOM();

            // Bind price range
            document.getElementById('apply-price-btn').addEventListener('click', () => {
                const minVal = parseFloat(document.getElementById('price-min').value) || 0;
                const maxVal = parseFloat(document.getElementById('price-max').value) || Infinity;

                filteredProducts = productsList.filter(p => p.price >= minVal && p.price <= maxVal);
                updateResultsDOM();
            });
        });

        async function loadFilters() {
            // Category Filter list
            const categories = await dbService.getCategories();
            const catList = document.getElementById('filter-categories-list');
            catList.innerHTML = `
                <li class="filter-item ${!activeCategory ? 'active' : ''}" data-slug="">
                    <span>All Categories</span>
                </li>
            ` + categories.map(cat => `
                <li class="filter-item ${activeCategory === cat.slug ? 'active' : ''}" data-slug="${cat.slug}">
                    <span>${getLocalizedText(cat, 'name')}</span>
                </li>
            `).join('');

            catList.querySelectorAll('li').forEach(li => {
                li.addEventListener('click', async () => {
                    catList.querySelectorAll('li').forEach(l => l.classList.remove('active'));
                    li.classList.add('active');
                    activeCategory = li.dataset.slug;
                    await executeQuery();
                });
            });

            // Brand Filter list
            const brands = await dbService.getBrands();
            const brandList = document.getElementById('filter-brands-list');
            brandList.innerHTML = `
                <li class="filter-item ${!activeBrand ? 'active' : ''}" data-slug="">
                    <span>All Brands</span>
                </li>
            ` + brands.map(br => `
                <li class="filter-item ${activeBrand === br.slug ? 'active' : ''}" data-slug="${br.slug}">
                    <span>${br.name}</span>
                </li>
            `).join('');

            brandList.querySelectorAll('li').forEach(li => {
                li.addEventListener('click', async () => {
                    brandList.querySelectorAll('li').forEach(l => l.classList.remove('active'));
                    li.classList.add('active');
                    activeBrand = li.dataset.slug;
                    await executeQuery();
                });
            });
        }

        async function executeQuery() {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('query') || '';
            const seller = params.get('seller') || '';

            productsList = await dbService.getProducts({
                search: query,
                categorySlug: activeCategory,
                brandSlug: activeBrand,
                sellerId: seller
            });

            filteredProducts = [...productsList];
            
            // Reset price filters
            document.getElementById('price-min').value = '';
            document.getElementById('price-max').value = '';

            updateResultsDOM();
        }

        function updateResultsDOM() {
            const grid = document.getElementById('products-results-grid');
            const countEl = document.getElementById('results-count');
            
            countEl.textContent = `${filteredProducts.length} items found`;

            if (filteredProducts.length === 0) {
                grid.innerHTML = `
                    <div style="background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 48px; text-align: center; grid-column: span 3;">
                        <span class="material-icons-round" style="font-size: 48px; color: var(--text-tertiary); margin-bottom: 16px;">search_off</span>
                        <h3 class="text-base font-bold" style="color: var(--text-primary); margin-bottom: 8px;">No items match</h3>
                        <p class="text-xs" style="color: var(--text-secondary);">Try loosening your filters or keyword query.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredProducts.map(p => createProductCardHTML(p)).join('');
            bindProductCardListeners('#products-results-grid');
        }
    </script>
</body>
</html>
