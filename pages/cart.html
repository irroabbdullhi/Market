<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuuqLink - Your Shopping Cart</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/app.js"></script>
</head>
<body>

    <header></header>

    <main class="container" style="margin-top: 32px; min-height: 70vh;">
        <h1 class="text-2xl font-bold" style="margin-bottom: 24px;">Shopping Cart</h1>

        <div class="flex justify-between gap-8 flex-wrap">
            <!-- Left Side: Cart Items List -->
            <div style="flex: 2; min-width: 320px;" class="flex flex-col gap-4" id="cart-items-container">
                <!-- Injected via JS -->
            </div>

            <!-- Right Side: Order Summary -->
            <div style="flex: 1; min-width: 300px;">
                <div style="background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 24px; box-shadow: var(--card-shadow);">
                    <h3 class="text-lg font-bold" style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">Order Summary</h3>
                    
                    <div class="flex-col gap-3" style="font-size: 14px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-bottom: 16px;">
                        <div class="flex justify-between">
                            <span style="color: var(--text-secondary);">Subtotal</span>
                            <span class="font-bold" id="summary-subtotal">$0.00</span>
                        </div>
                        
                        <!-- Coupon Code Discount -->
                        <div class="flex justify-between hidden" id="summary-discount-row" style="color: var(--color-accent);">
                            <span>Discount Coupon</span>
                            <span class="font-bold" id="summary-discount">-$0.00</span>
                        </div>

                        <div class="flex justify-between">
                            <span style="color: var(--text-secondary);">Shipping Fee</span>
                            <span class="font-bold" id="summary-shipping">$5.00</span>
                        </div>
                        <div class="flex justify-between">
                            <span style="color: var(--text-secondary);">Estimated Tax (5%)</span>
                            <span class="font-bold" id="summary-tax">$0.00</span>
                        </div>
                    </div>

                    <!-- Total Amount -->
                    <div class="flex justify-between align-center font-bold" style="font-size: 18px; margin-bottom: 24px;">
                        <span>Grand Total</span>
                        <span id="summary-total" style="color: var(--color-brand);">$0.00</span>
                    </div>

                    <!-- Coupon Code Input -->
                    <div class="form-group" style="margin-bottom: 24px;">
                        <label class="form-label">Have a Coupon?</label>
                        <div class="flex gap-2">
                            <input type="text" id="coupon-input" class="form-input" style="padding: 8px 12px; font-size: 13px;" placeholder="e.g. WELCOME10">
                            <button id="apply-coupon-btn" class="btn btn-secondary" style="padding: 8px 16px; font-size: 13px;">Apply</button>
                        </div>
                        <span class="text-xs" id="coupon-message" style="margin-top: 4px; display: block; font-weight: 600;"></span>
                    </div>

                    <!-- Checkout Redirect -->
                    <button id="checkout-btn" class="btn btn-primary w-full" style="padding: 14px; border-radius: var(--radius-sm);">
                        Proceed to Checkout &rarr;
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>

    <!-- Interactive script driver -->
    <script type="module">
        import { dbService } from '../js/services/dbService.js';
        import { authService } from '../js/services/authService.js';
        import { formatCurrency, showToast } from '../js/utils/helpers.js';

        let cartList = [];
        let appliedCoupon = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadCartData();

            // Coupon Code Application
            document.getElementById('apply-coupon-btn').addEventListener('click', async () => {
                const code = document.getElementById('coupon-input').value.trim();
                const msgEl = document.getElementById('coupon-message');
                
                if (!code) {
                    msgEl.textContent = '';
                    return;
                }

                const subtotal = calculateSubtotal();
                const coupon = await dbService.getCoupon(code);

                if (!coupon) {
                    msgEl.textContent = 'Invalid or expired coupon code.';
                    msgEl.style.color = '#ef4444';
                    appliedCoupon = null;
                } else if (subtotal < coupon.min_order_amount) {
                    msgEl.textContent = `Minimum order amount of ${formatCurrency(coupon.min_order_amount)} required.`;
                    msgEl.style.color = '#ff6f00';
                    appliedCoupon = null;
                } else {
                    appliedCoupon = coupon;
                    msgEl.textContent = 'Coupon applied successfully!';
                    msgEl.style.color = 'var(--color-brand)';
                }
                
                updateSummaryTotals();
            });

            // Checkout redirection handler
            document.getElementById('checkout-btn').addEventListener('click', async () => {
                if (cartList.length === 0) {
                    showToast('Please add items to cart first!', 'warning');
                    return;
                }

                // If not logged in, prompt sign in
                const session = await authService.getSession();
                if (!session?.user) {
                    showToast('Please sign in to proceed with checkout', 'warning');
                    setTimeout(() => {
                        window.location.href = '/pages/login.html';
                    }, 1500);
                    return;
                }

                // Store checkout calculations in session storage
                const subtotal = calculateSubtotal();
                const discount = calculateDiscount();
                const shipping = 5.00;
                const tax = (subtotal - discount) * 0.05;
                const total = subtotal - discount + shipping + tax;

                sessionStorage.setItem('suuqlink_checkout_calc', JSON.stringify({
                    subtotal,
                    discount,
                    shipping,
                    tax,
                    total,
                    coupon_code: appliedCoupon ? appliedCoupon.code : null
                }));

                window.location.href = '/pages/checkout.html';
            });
        });

        async function loadCartData() {
            const container = document.getElementById('cart-items-container');
            const session = await authService.getSession();
            const user = session?.user;

            if (user) {
                cartList = await dbService.getCart(user.id);
            } else {
                // Read from guest cart localstorage
                const localCart = JSON.parse(localStorage.getItem('suuqlink_cart') || '[]');
                cartList = [];
                for (const item of localCart) {
                    const prod = await dbService.getProductById(item.product_id);
                    if (prod) {
                        cartList.push({
                            id: Math.random().toString(),
                            product_id: item.product_id,
                            quantity: item.quantity,
                            products: prod
                        });
                    }
                }
            }

            if (cartList.length === 0) {
                container.innerHTML = `
                    <div style="background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 48px; text-align: center;">
                        <span class="material-icons-round" style="font-size: 48px; color: var(--text-tertiary); margin-bottom: 16px;">shopping_cart_checkout</span>
                        <h3 class="text-base font-bold" style="color: var(--text-primary); margin-bottom: 8px;">Your cart is empty</h3>
                        <p class="text-xs" style="color: var(--text-secondary); margin-bottom: 24px;">Explore our catalog of premium local products and grab yours.</p>
                        <a href="/" class="btn btn-primary">Go Shopping</a>
                    </div>
                `;
                updateSummaryTotals();
                return;
            }

            // Render Item rows
            container.innerHTML = cartList.map(item => {
                const prod = item.products;
                const name = prod.name_en; // Fallback to english simple
                const img = prod.images?.[0] || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=400';
                
                return `
                    <div class="flex align-center justify-between gap-4" style="background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--card-shadow);" data-item-id="${item.id}">
                        <div class="flex align-center gap-4" style="flex: 1;">
                            <img src="${img}" alt="${name}" style="width: 72px; height: 72px; object-fit: contain; border-radius: var(--radius-sm); border: 1px solid var(--border-color); background-color: var(--bg-secondary);">
                            <div class="flex-col">
                                <h4 class="text-sm font-bold" style="max-width: 320px; line-height: 1.3;"><a href="/pages/product-detail.html?id=${item.product_id}">${name}</a></h4>
                                <span class="text-xs" style="color: var(--text-secondary); margin-top: 4px;">SKU: ${prod.sku || 'N/A'}</span>
                            </div>
                        </div>

                        <!-- Quantity selectors -->
                        <div class="flex align-center" style="border: 1px solid var(--border-color); border-radius: var(--radius-sm); overflow: hidden; background-color: var(--bg-secondary); margin: 0 16px;">
                            <button class="btn-icon qty-dec-btn" style="width: 32px; height: 32px; border-radius: 0;">-</button>
                            <input type="number" class="qty-input" value="${item.quantity}" style="width: 36px; text-align: center; border: none; background: transparent; font-weight: 700; color: var(--text-primary);" readonly>
                            <button class="btn-icon qty-inc-btn" style="width: 32px; height: 32px; border-radius: 0;">+</button>
                        </div>

                        <!-- Price display -->
                        <div class="flex-col text-right" style="min-width: 100px;">
                            <span class="text-sm font-bold" style="color: var(--text-primary);">${formatCurrency(prod.price * item.quantity)}</span>
                            <span class="text-xs" style="color: var(--text-tertiary);">${formatCurrency(prod.price)} each</span>
                        </div>

                        <!-- Remove Trash -->
                        <button class="btn-icon remove-item-btn" style="color: #ef4444;" title="Remove Item">
                            <span class="material-icons-round">delete_outline</span>
                        </button>
                    </div>
                `;
            }).join('');

            bindCartRowListeners();
            updateSummaryTotals();
        }

        function bindCartRowListeners() {
            const rows = document.querySelectorAll('#cart-items-container > div');
            rows.forEach(row => {
                const itemId = row.dataset.itemId;
                const item = cartList.find(c => c.id === itemId);
                if (!item) return;

                const decBtn = row.querySelector('.qty-dec-btn');
                const incBtn = row.querySelector('.qty-inc-btn');
                const removeBtn = row.querySelector('.remove-item-btn');
                const qtyInput = row.querySelector('.qty-input');

                decBtn.addEventListener('click', async () => {
                    if (item.quantity > 1) {
                        item.quantity--;
                        qtyInput.value = item.quantity;
                        await updateQty(item);
                    }
                });

                incBtn.addEventListener('click', async () => {
                    item.quantity++;
                    qtyInput.value = item.quantity;
                    await updateQty(item);
                });

                removeBtn.addEventListener('click', async () => {
                    const session = await authService.getSession();
                    const user = session?.user;

                    if (user) {
                        await dbService.removeFromCart(item.id);
                    } else {
                        // Remove guest cart
                        const localCart = JSON.parse(localStorage.getItem('suuqlink_cart') || '[]');
                        const updated = localCart.filter(c => c.product_id !== item.product_id);
                        localStorage.setItem('suuqlink_cart', JSON.stringify(updated));
                    }
                    showToast('Item removed');
                    window.dispatchEvent(new Event('cartchange'));
                    await loadCartData();
                });
            });
        }

        async function updateQty(item) {
            const session = await authService.getSession();
            const user = session?.user;

            if (user) {
                await dbService.updateCartQuantity(item.id, item.quantity);
            } else {
                // Update local storage guest cart qty
                const localCart = JSON.parse(localStorage.getItem('suuqlink_cart') || '[]');
                const match = localCart.find(c => c.product_id === item.product_id);
                if (match) match.quantity = item.quantity;
                localStorage.setItem('suuqlink_cart', JSON.stringify(localCart));
            }
            
            window.dispatchEvent(new Event('cartchange'));
            await loadCartData();
        }

        function calculateSubtotal() {
            return cartList.reduce((sum, item) => sum + (item.products.price * item.quantity), 0);
        }

        function calculateDiscount() {
            if (!appliedCoupon) return 0;
            const subtotal = calculateSubtotal();
            if (appliedCoupon.discount_type === 'percentage') {
                return (subtotal * appliedCoupon.discount_value) / 100;
            }
            return parseFloat(appliedCoupon.discount_value);
        }

        function updateSummaryTotals() {
            const subtotal = calculateSubtotal();
            const discount = calculateDiscount();
            const shipping = subtotal > 0 ? 5.00 : 0.00;
            const tax = (subtotal - discount) * 0.05;
            const total = subtotal - discount + shipping + tax;

            document.getElementById('summary-subtotal').textContent = formatCurrency(subtotal);
            
            const discRow = document.getElementById('summary-discount-row');
            if (discount > 0) {
                discRow.classList.remove('hidden');
                document.getElementById('summary-discount').textContent = `-${formatCurrency(discount)}`;
            } else {
                discRow.classList.add('hidden');
            }

            document.getElementById('summary-shipping').textContent = formatCurrency(shipping);
            document.getElementById('summary-tax').textContent = formatCurrency(tax > 0 ? tax : 0);
            document.getElementById('summary-total').textContent = formatCurrency(total > 0 ? total : 0);
        }
    </script>
</body>
</html>
